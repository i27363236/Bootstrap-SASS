<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>顏色</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    </head>
    <body>
        <div class="text-primary">primary</div>
        <div class="text-primary-emphasis">primary-emphasis</div>
        <div class="text-secondary">secondary</div>
        <div class="text-secondary-emphasis">secondary-emphasis</div>
        <div class="text-success">success</div>
        <div class="text-success-emphasis">success-emphasis</div>

        <div class="text-danger">danger</div>
        <div class="text-danger-emphasis">danger-emphasis</div>

        <div class="text-warning">warning</div>
        <div class="text-warning-emphasis">warning-emphasis</div>

        <div class="text-info">info</div>
        <div class="text-info-emphasis">info-emphasis</div>

        <!-- text-xxl-center當畫面尺寸為xxl時，會套用位置center -->
        <div class="bg-primary text-light h1 my-auto text-xxl-center">primary</div>
        <div class="bg-secondary text-light h1 mb-0 text-end">secondary</div>
        <div class="bg-success text-light h1 m-0">success</div>
        <div class="bg-danger text-light h1 my-0">danger</div>
        <div class="bg-warning text-white fs-3">warning</div>
        <div class="bg-info text-white display-1 p-5 text-center fw-bold">info</div>
        <div class="bg-info-subtle text-white fs-6">info</div>


        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    </body>
</html>
