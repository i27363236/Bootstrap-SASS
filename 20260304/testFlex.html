<!DOCTYPE html>
<html lang="zh-hant-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>純CSS的Flex版面推擠</title>
    <style>
        .container{
            display: flex;
            align-items: flex-end;
            background-color:palegoldenrod;
            width: 600px;
            height: 480px;
            gap: 20px;
            
            /* 巢狀寫法 */
            .box{
                background-color: palevioletred;
                width: 120px;
                height: 250px;
                display: flex;
                justify-content: center;
                align-items: center;
                box-sizing: border-box;
                font-size: 50px;
                color: white;

                &:nth-child(2){
                    height: 150px;
                    margin-left: auto;
                }
                &:nth-child(3){
                    height: 200px;
                }
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box">1</div>
        <div class="box">2</div>
        <div class="box">3</div>
    </div>
</body>
</html>
