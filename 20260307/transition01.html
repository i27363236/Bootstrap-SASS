<!DOCTYPE html>
<html lang="zh-hant-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transition控制自己的屬性</title>
    <style>
        html{
            height: 100%;
        }
        body{
            height: 100%;
            display: grid;
            place-items: center;
        }
        .btn {
            display: inline-block;
            width: 100px;
            height: 30px;
            text-align: center;
            line-height: 30px;
            border-radius: 4px;
            background-color: #ff9595;
            color: azure;
            cursor: pointer;
            user-select: none;
            transition: all 0.2s;
            scale: 2;

            &:hover {
                width: 130px;
                height: 40px;
                text-align: center;
                line-height: 40px;
            }
        }
    </style>
</head>

<body>
    <div class="btn">BUTTON1</div>
</body>

</html>
