<!DOCTYPE html>
<html lang="zh-hant-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>gsapEase</title>

    <style>
        .circle {
            position: relative;
            width: 100px;
            height: 100px;
            background-color:rgb(255, 236, 130);
            border-radius: 50%;
        }
    </style>
</head>

<body>
    <div class="circle circle1"></div>
    <div class="circle circle2"></div>
    <div class="circle circle3"></div>
    <div class="circle circle4"></div>
    <div class="circle circle5"></div>
    


    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.1/dist/gsap.min.js"></script>
    <script>
        requestIdleCallback(function(){
            gsap.to(".circle1", {
                x: 500, 
                duration: 2,
                ease: "linear",
            });

            gsap.to(".circle2", {
                x: 500, 
                duration: 2,
                ease: "power1.out",
                delay: 1
            });

            gsap.to(".circle3", {
                x: 500, 
                duration: 3,
                ease: "back.out(1.7)",
                delay: 2
            });

            gsap.to(".circle4", {
                x: 500, 
                duration: 4,
                ease: "elastic.out(1, 0.3)",
                delay: 3
            });

            gsap.to(".circle5", {
                x: 500, 
                duration: 3,
                ease: "bounce.out",
                delay: 3
            });
        })
    </script>
</body>

</html>
