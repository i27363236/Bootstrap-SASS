<!DOCTYPE html>
<html lang="zh-hant-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>gsapFrom.To</title>

    <style>
        .circle {
            position: absolute;
            left: 50px;
            top: 50px;
            width: 100px;
            height: 100px;
            background-color: skyblue;
            border-radius: 50%;
            transform: translate(-50%, -50%);
        }
    </style>
</head>

<body>
    <div class="circle"></div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.1/dist/gsap.min.js"></script>
    <script>

        let ary = []; //[]陣列，onComplete時有重新賦值ary，所以這裡必須用let

        window.addEventListener("click", (event) => {
            if (ary.length < 2) {
                ary.push([event.pageX, event.pageY]);
                // console.log(ary);
                // console.log(ary.length);

                if (ary.length == 2) {
                    gsap.fromTo(
                        ".circle",
                        {
                            x: ary[0][0],
                            y: ary[0][1]
                        },
                        {
                            x: ary[1][0],
                            y: ary[1][1],
                            duration: 1,
                            repeat: 2,
                            yoyo: true, //repeat時才能用yoyo，會變成來回移動

                            onComplete: function() {
                                console.log("動畫完成");
                                ary = [];
                            }
                        }
                    )
                }
            };
        })
    </script>
</body>

</html>
